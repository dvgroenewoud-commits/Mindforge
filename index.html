const { useState, useCallback, useRef, useMemo, useEffect } = React;

const loadJSZip = () => new Promise((res, rej) => {
  if (window.JSZip) return res(window.JSZip);
  const s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
  s.onload = () => res(window.JSZip); s.onerror = rej;
  document.head.appendChild(s);
});

const PALETTES = {
  "Standaard": ["#9c5dff","#40c4ff","#ff6b9d","#ffb347","#7bed9f","#ff6348","#70a1ff","#ffd32a"],
  "Medisch":   ["#00b4d8","#0077b6","#48cae4","#90e0ef","#2196f3","#5e60ce","#023e8a","#48bfe3"],
  "Warm":      ["#e63946","#f4a261","#e9c46a","#2a9d8f","#264653","#e76f51","#a8dadc","#457b9d"],
  "Pastel":    ["#ffb3c1","#ffd6a5","#fdffb6","#caffbf","#9bf6ff","#a0c4ff","#bdb2ff","#ffc6ff"],
};

const esc = (s) => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function extractYouTubeId(url) {
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function extractVimeoId(url) {
  const m = url.match(/vimeo\.com\/(?:video\/)?(\d{5,12})/);
  return m ? m[1] : null;
}
function detectVideoUrl(url) {
  if (!url) return null;
  if (extractYouTubeId(url)) return { platform: "YouTube", id: extractYouTubeId(url), color: "#ff6b6b" };
  if (extractVimeoId(url))   return { platform: "Vimeo",   id: extractVimeoId(url),   color: "#40c4ff" };
  return null;
}

const toBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result.split(",")[1]);
  r.onerror = rej;
  r.readAsDataURL(file);
});

async function fetchVimeoInfo(videoId, token) {
  const resp = await fetch(`https://api.vimeo.com/videos/${videoId}?fields=name,description,privacy`, {
    headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.vimeo.*+json;version=3.4" }
  });
  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error || `Vimeo API fout (${resp.status})`);
  }
  return resp.json();
}

async function fetchVimeoTranscript(videoId, token) {
  try {
    const r = await fetch(`https://api.vimeo.com/videos/${videoId}/transcript`, {
      headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.vimeo.*+json;version=3.4" }
    });
    if (r.ok) {
      const d = await r.json();
      const segs = d.transcript || [];
      if (segs.length > 0) {
        const text = segs.map(s => s.text?.trim()).filter(Boolean).join(" ");
        if (text.length > 50) return { text, method: "transcript" };
      }
    }
  } catch(_) {}
  const ttResp = await fetch(`https://api.vimeo.com/videos/${videoId}/texttracks`, {
    headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.vimeo.*+json;version=3.4" }
  });
  if (ttResp.ok) {
    const ttData = await ttResp.json();
    const tracks = (ttData.data || []).filter(t => t.active !== false);
    if (tracks.length > 0) {
      const track = tracks.find(t => t.language?.startsWith("nl") || t.language?.startsWith("en")) || tracks[0];
      try {
        const vttResp = await fetch(track.link);
        if (vttResp.ok) {
          const vtt = await vttResp.text();
          const text = vtt.split("\n")
            .filter(l => l && !l.startsWith("WEBVTT") && !l.match(/^\d+$/) && !l.match(/[\d:]+\s*-->/) && !l.startsWith("NOTE"))
            .map(l => l.replace(/<[^>]+>/g, "").trim())
            .filter(Boolean).join(" ");
          if (text.length > 50) return { text, method: "texttrack", lang: track.language };
        }
      } catch(_) {}
    }
  }
  throw new Error("Geen transcript gevonden.");
}

function buildOPML(mm, styles=[]) {
  const ro = (node, indent=3, si=null) => {
    const pad=" ".repeat(indent*2), st=si!=null?styles[si]:null;
    const ca=st?` color="${st.color}"`:"", sha=st?` shape="${st.shape}"`:"";
    if(!node.children?.length) return `${pad}<outline text="${esc(node.text)}"${ca}/>`;
    const inner=node.children.map(c=>ro(c,indent+1)).join("\n");
    return `${pad}<outline text="${esc(node.text)}"${ca}${sha}>\n${inner}\n${pad}</outline>`;
  };
  const body=(mm.branches||[]).map((b,i)=>ro(b,3,i)).join("\n");
  return `<?xml version="1.0" encoding="UTF-8"?>\n<opml version="1.0">\n  <head><title>${esc(mm.title)}</title></head>\n  <body>\n    <outline text="${esc(mm.title)}">\n${body}\n    </outline>\n  </body>\n</opml>`;
}

function buildMM(mm, styles=[]) {
  const FS={small:10,normal:14,large:18};
  const rn=(node,depth,bi=0)=>{
    const st=styles[bi]||{}, col=depth===1?st.color||"#9c5dff":"";
    const ca=col?` COLOR="${col}"`:"", sha=depth===1?` STYLE="${st.shape||"bubble"}"`:"";
    const ft=depth===1?`\n  <font NAME="SansSerif" SIZE="${FS[st.size||"normal"]}"${st.bold?' BOLD="true"':""}/>`:"";
    const ed=depth===1&&col?`\n  <edge COLOR="${col}" WIDTH="2"/>`:"";
    if(!node.children?.length) return `<node TEXT="${esc(node.text)}"${ca}>${ft}${ed}\n</node>`;
    const inner=node.children.map(c=>rn(c,depth+1,bi)).join("\n");
    return `<node TEXT="${esc(node.text)}"${ca}${sha}>${ft}${ed}\n${inner}\n</node>`;
  };
  const branches=(mm.branches||[]).map((b,i)=>rn(b,1,i)).join("\n");
  return `<map version="1.0.1">\n<node TEXT="${esc(mm.title)}" STYLE="fork">\n${branches}\n</node>\n</map>`;
}

function defaultStyles(branches, palName="Standaard") {
  const pal=PALETTES[palName];
  return branches.map((_,i)=>({color:pal[i%pal.length],shape:"bubble",bold:false,size:"normal"}));
}
function countNodes(branches) {
  let n=0; const w=(a)=>a.forEach(b=>{n++;if(b.children)w(b.children);}); w(branches||[]); return n;
}

function buildSVGString(mindmap, palette, W=1200, H=900) {
  const {nodes,edges,bbox}=layoutMindMap(mindmap,palette);
  const nodeMap=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const pad=40,scale=Math.min((W-pad*2)/bbox.w,(H-pad*2)/bbox.h,1.6);
  const tx=n=>(n.x-bbox.minX)*scale+pad, ty=n=>(n.y-bbox.minY)*scale+pad;
  const wrap=(t,m)=>{const ws=t.split(" ");const ls=[];let cur="";ws.forEach(w=>{const x=cur?cur+" "+w:w;if(x.length*6>m&&cur){ls.push(cur);cur=w;}else cur=x;});if(cur)ls.push(cur);return ls.slice(0,3);};
  const defs=palette.map((col,i)=>`<radialGradient id="sg${i}" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="${col}" stop-opacity=".9"/><stop offset="100%" stop-color="${col}" stop-opacity=".55"/></radialGradient>`).join("")+
    `<radialGradient id="sgr"><stop offset="0%" stop-color="#2a2838"/><stop offset="100%" stop-color="#1a1828"/></radialGradient>`+
    `<filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".4"/></filter>`;
  const edgesSVG=edges.map(e=>{const a=nodeMap[e.from],b=nodeMap[e.to];if(!a||!b)return"";
    const[ax,ay,bx,by]=[tx(a),ty(a),tx(b),ty(b)];
    return`<path d="M${ax} ${ay} C${ax+(bx-ax)*.5} ${ay},${bx-(bx-ax)*.1} ${by},${bx} ${by}" fill="none" stroke="${e.color}" stroke-width="${e.width*scale}" stroke-opacity=".6" stroke-linecap="round"/>`;}).join("");
  const nodesSVG=nodes.map(nd=>{
    const x=tx(nd),y=ty(nd),ci=nd.branchIdx??0;
    const txt=(lines,size,fill)=>lines.map((l,i)=>`<text x="${x}" y="${y+(i-(lines.length-1)/2)*size*scale}" text-anchor="middle" dominant-baseline="middle" fill="${fill}" font-size="${size*scale}" font-family="monospace">${esc(l)}</text>`).join("");
    if(nd.depth===0){const r=nd.r*scale;return`<g filter="url(#sh)"><circle cx="${x}" cy="${y}" r="${r}" fill="url(#sgr)" stroke="#9c5dff" stroke-width="${1.5*scale}" stroke-opacity=".6"/>${txt(wrap(nd.text,r*2.8),11,"#f0ece4")}</g>`;}
    if(nd.depth===1){const ls=wrap(nd.text,90),w=Math.max(60,Math.min(110,nd.text.length*5.5))*scale,h=(20+(ls.length-1)*13)*scale,r=10*scale;return`<g filter="url(#sh)"><rect x="${x-w/2}" y="${y-h/2}" width="${w}" height="${h}" rx="${r}" fill="url(#sg${ci%palette.length})" stroke="${nd.color}" stroke-width="${scale}" stroke-opacity=".4"/>${txt(ls,9.5,"white")}</g>`;}
    if(nd.depth===2){const ls=wrap(nd.text,80),w=Math.max(48,Math.min(96,nd.text.length*5))*scale,h=(15+(ls.length-1)*11)*scale;return`<rect x="${x-w/2}" y="${y-h/2}" width="${w}" height="${h}" rx="${5*scale}" fill="#1a1828" stroke="${nd.color}" stroke-width="${scale}" stroke-opacity=".5"/>${txt(ls,8.5,nd.color)}`;}
    return txt(wrap(nd.text,72),7.5,nd.color+"bb");
  }).join("");
  return`<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" style="background:#08080b"><defs>${defs}</defs>${edgesSVG}${nodesSVG}</svg>`;
}

async function exportPNG(mindmap, palette, scale=2) {
  const W=1200, H=900;
  const svgStr = buildSVGString(mindmap, palette, W, H);
  const blob = new Blob([svgStr], {type:"image/svg+xml"});
  const url = URL.createObjectURL(blob);
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width=W*scale; canvas.height=H*scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale,scale);
      ctx.fillStyle="#08080b"; ctx.fillRect(0,0,W,H);
      ctx.drawImage(img,0,0,W,H);
      URL.revokeObjectURL(url);
      canvas.toBlob(b=>res(b),"image/png");
    };
    img.onerror = rej;
    img.src = url;
  });
}

function buildSMMX(mindmap, styles=[]) {
  const palette = styles.map(s=>s.color);
  let nodeId = 1;
  const nodes = [], connections = [];
  const rootId = nodeId++;
  nodes.push(`<node id="${rootId}" title="${esc(mindmap.title)}" x="0" y="0" width="160" height="60" shape="roundedrect" fillColor="#1e1d28" textColor="#f0ece4" borderColor="#9c5dff" fontSize="16" fontBold="true"/>`);
  (mindmap.branches||[]).forEach((branch, bi) => {
    const color = palette[bi] || "#9c5dff";
    const bId = nodeId++;
    const angle = (2*Math.PI/mindmap.branches.length)*bi - Math.PI/2;
    const bx = Math.round(Math.cos(angle)*280), by = Math.round(Math.sin(angle)*220);
    nodes.push(`<node id="${bId}" title="${esc(branch.text)}" x="${bx}" y="${by}" width="140" height="50" shape="roundedrect" fillColor="${color}" textColor="#ffffff" borderColor="${color}" fontSize="13" fontBold="true"/>`);
    connections.push(`<connection id="${nodeId++}" startNodeId="${rootId}" endNodeId="${bId}" color="${color}" lineWidth="3"/>`);
    (branch.children||[]).forEach((sub, si) => {
      const sId = nodeId++;
      const spread = Math.min(1.2, (branch.children.length*0.4));
      const sa = angle - spread/2 + (branch.children.length>1 ? spread/(branch.children.length-1)*si : 0);
      const sx = bx+Math.round(Math.cos(sa)*220), sy = by+Math.round(Math.sin(sa)*180);
      nodes.push(`<node id="${sId}" title="${esc(sub.text)}" x="${sx}" y="${sy}" width="120" height="40" shape="roundedrect" fillColor="#16151a" textColor="${color}" borderColor="${color}" fontSize="11"/>`);
      connections.push(`<connection id="${nodeId++}" startNodeId="${bId}" endNodeId="${sId}" color="${color}" lineWidth="2"/>`);
      (sub.children||[]).forEach((leaf, li) => {
        const lId = nodeId++;
        const lspread = 0.6, la = sa - lspread/2 + (sub.children.length>1 ? lspread/(sub.children.length-1)*li : 0);
        const lx = sx+Math.round(Math.cos(la)*160), ly = sy+Math.round(Math.sin(la)*130);
        nodes.push(`<node id="${lId}" title="${esc(leaf.text)}" x="${lx}" y="${ly}" width="110" height="36" shape="roundedrect" fillColor="#0e0e10" textColor="${color}cc" borderColor="${color}55" fontSize="10"/>`);
        connections.push(`<connection id="${nodeId++}" startNodeId="${sId}" endNodeId="${lId}" color="${color}88" lineWidth="1"/>`);
      });
    });
  });
  return `<?xml version="1.0" encoding="UTF-8"?>\n<simplemind>\n  <map title="${esc(mindmap.title)}" version="1.0">\n    <nodes>\n      ${nodes.join("\n      ")}\n    </nodes>\n    <connections>\n      ${connections.join("\n      ")}\n    </connections>\n  </map>\n</simplemind>`;
}

function buildMarkdown(mindmap) {
  const lines = [`# ${mindmap.title}\n`];
  (mindmap.branches||[]).forEach(branch => {
    lines.push(`## ${branch.text}`);
    (branch.children||[]).forEach(sub => {
      lines.push(`### ${sub.text}`);
      (sub.children||[]).forEach(leaf => { lines.push(`- ${leaf.text}`); });
    });
    lines.push("");
  });
  return lines.join("\n");
}

function layoutMindMap(mindmap, palette) {
  const nodes=[], edges=[];
  const branches=mindmap.branches||[], n=branches.length;
  nodes.push({id:"root",text:mindmap.title,x:0,y:0,depth:0,color:"#e8e4dc",r:38});
  const startAngle=-Math.PI/2-Math.PI/n, angleStep=(2*Math.PI)/n;
  branches.forEach((branch,bi)=>{
    const color=palette[bi%palette.length], angle=startAngle+bi*angleStep, R1=180;
    const bx=Math.cos(angle)*R1, by=Math.sin(angle)*R1, bId=`b${bi}`;
    nodes.push({id:bId,text:branch.text,x:bx,y:by,depth:1,color,r:28,branchIdx:bi});
    edges.push({from:"root",to:bId,color,width:2.5});
    const subs=branch.children||[], ns=subs.length;
    if(!ns) return;
    const spread=Math.min(Math.PI*0.7,ns*0.45), subStart=angle-spread/2, subStep=ns>1?spread/(ns-1):0, R2=140;
    subs.forEach((sub,si)=>{
      const subAngle=ns===1?angle:subStart+si*subStep, sx=bx+Math.cos(subAngle)*R2, sy=by+Math.sin(subAngle)*R2, sId=`b${bi}s${si}`;
      nodes.push({id:sId,text:sub.text,x:sx,y:sy,depth:2,color,r:0,branchIdx:bi});
      edges.push({from:bId,to:sId,color,width:1.5});
      const leafs=sub.children||[], nl=leafs.length;
      if(!nl) return;
      const lspread=Math.min(Math.PI*0.45,nl*0.3), lstart=subAngle-lspread/2, lstep=nl>1?lspread/(nl-1):0, R3=100;
      leafs.forEach((leaf,li)=>{
        const la=nl===1?subAngle:lstart+li*lstep, lx=sx+Math.cos(la)*R3, ly=sy+Math.sin(la)*R3, lId=`b${bi}s${si}l${li}`;
        nodes.push({id:lId,text:leaf.text,x:lx,y:ly,depth:3,color,r:0,branchIdx:bi});
        edges.push({from:sId,to:lId,color,width:1});
      });
    });
  });
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  nodes.forEach(nd=>{const p=nd.depth===0?50:nd.depth===1?60:45;minX=Math.min(minX,nd.x-p);maxX=Math.max(maxX,nd.x+p);minY=Math.min(minY,nd.y-p);maxY=Math.max(maxY,nd.y+p);});
  return{nodes,edges,bbox:{minX,maxX,minY,maxY,w:maxX-minX,h:maxY-minY}};
}

function MindMapSVG({mindmap,palette,width,height}){
  const layout=useMemo(()=>layoutMindMap(mindmap,palette),[mindmap,palette]);
  const{nodes,edges,bbox}=layout, nodeMap=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const pad=24, scaleX=(width-pad*2)/bbox.w, scaleY=(height-pad*2)/bbox.h, scale=Math.min(scaleX,scaleY,1.4);
  const tx=n=>(n.x-bbox.minX)*scale+pad, ty=n=>(n.y-bbox.minY)*scale+pad;
  const wrap=(text,maxW)=>{const words=text.split(" ");const lines=[];let cur="";words.forEach(w=>{const t=cur?cur+" "+w:w;if(t.length*6>maxW&&cur){lines.push(cur);cur=w;}else cur=t;});if(cur)lines.push(cur);return lines.slice(0,3);};
  return(
    <svg width={width} height={height} style={{display:"block"}}>
      <defs>
        {palette.map((c,i)=><radialGradient key={i} id={`g${i}`} cx="40%" cy="35%" r="65%"><stop offset="0%" stopColor={c} stopOpacity="0.9"/><stop offset="100%" stopColor={c} stopOpacity="0.55"/></radialGradient>)}
        <radialGradient id="groot" cx="40%" cy="35%" r="65%"><stop offset="0%" stopColor="#2a2838"/><stop offset="100%" stopColor="#1a1828"/></radialGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" floodColor="#000" floodOpacity="0.4"/></filter>
      </defs>
      {edges.map((e,i)=>{const a=nodeMap[e.from],b=nodeMap[e.to];if(!a||!b)return null;const ax=tx(a),ay=ty(a),bx=tx(b),by=ty(b),cx1=ax+(bx-ax)*0.5,cy1=ay,cx2=bx-(bx-ax)*0.1,cy2=by;return<path key={i} d={`M ${ax} ${ay} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${bx} ${by}`} fill="none" stroke={e.color} strokeWidth={e.width*scale} strokeOpacity={0.6} strokeLinecap="round"/>;})}
      {nodes.map(nd=>{
        const x=tx(nd),y=ty(nd),ci=nd.branchIdx??0;
        if(nd.depth===0){const r=nd.r*scale,lines=wrap(nd.text,r*2.8),lh=13*scale;return<g key={nd.id} filter="url(#shadow)"><circle cx={x} cy={y} r={r} fill="url(#groot)" stroke="#9c5dff" strokeWidth={1.5*scale} strokeOpacity={0.6}/>{lines.map((l,i)=><text key={i} x={x} y={y+(i-(lines.length-1)/2)*lh} textAnchor="middle" dominantBaseline="middle" fill="#f0ece4" fontSize={11*scale} fontFamily="'JetBrains Mono',monospace" fontWeight="500">{l}</text>)}</g>;}

        if(nd.depth===2){const lines=wrap(nd.text,80),w=Math.max(48,Math.min(96,nd.text.length*5))*scale,h=(15+(lines.length-1)*11)*scale;return<g key={nd.id}><rect x={x-w/2} y={y-h/2} width={w} height={h} rx={5*scale} ry={5*scale} fill="#1a1828" stroke={nd.color} strokeWidth={1*scale} strokeOpacity={0.5}/>{lines.map((l,i)=><text key={i} x={x} y={y+(i-(lines.length-1)/2)*11*scale} textAnchor="middle" dominantBaseline="middle" fill={nd.color} fontSize={8.5*scale} fontFamily="'JetBrains Mono',monospace">{l}</text>)}</g>;}

    const pdfs = Array.from(fileList).filter(f => f.type==="application/pdf"||f.name.endsWith(".pdf"));
    const newEntries = await Promise.all(pdfs.map(async f => ({name:f.name,data:await toBase64(f)})));
    setPdfFiles(prev=>{const existing=new Set(prev.map(p=>p.name));return[...prev,...newEntries.filter(e=>!existing.has(e.name))];});
  };
  const handleDrop = async (e) => { e.preventDefault();setDragOver(false);await addFiles(e.dataTransfer.files); };
  const handleFileChange = async (e) => { await addFiles(e.target.files);e.target.value=""; };
  const removeFile = (name) => setPdfFiles(prev=>prev.filter(p=>p.name!==name));
  return(
    <>
      <div className="src-tabs">
        <button className={`src-tab ${srcType==="text"?"active":""}`} onClick={()=>setSrcType("text")}>📝 Tekst</button>

        <div className={`drop-zone ${dragOver?"over":""} ${pdfFiles.length?"has-file":""}`} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={handleDrop}>
          <input type="file" accept=".pdf,application/pdf" multiple onChange={handleFileChange}/>
          <div className="drop-icon">⬆</div>
          <div className="drop-title">Sleep PDF-bestanden hierheen</div>
          <div className="drop-sub">of klik om te bladeren · meerdere bestanden tegelijk toegestaan</div>
        </div>
        {pdfFiles.length>0&&(<div style={{marginTop:10,display:"flex",flexDirection:"column",gap:5}}>
          {pdfFiles.map((f,i)=>(<div key={f.name} style={{display:"flex",alignItems:"center",gap:8,background:"#0e0e10",border:"1px solid #1e1d25",borderRadius:8,padding:"7px 12px"}}>
            <span style={{fontSize:"1rem"}}>📄</span>
            <span style={{flex:1,fontSize:".76rem",color:"#c5bfd8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
            <button onClick={()=>removeFile(f.name)} style={{background:"none",border:"none",color:"#6b6875",cursor:"pointer",fontSize:".8rem",padding:"2px 6px",borderRadius:4,transition:"color .15s"}} onMouseOver={e=>e.target.style.color="#ff7070"} onMouseOut={e=>e.target.style.color="#6b6875"}>✕</button>
          </div>))}
          <div style={{fontSize:".68rem",color:"#6b6875",paddingLeft:4}}>{pdfFiles.length} bestand{pdfFiles.length!==1?"en":""} geselecteerd · alle PDFs worden samen geanalyseerd</div>
        </div>)}
      </>)}
      {srcType==="youtube"&&(<>
        <input type="text" placeholder="YouTube: youtube.com/watch?v=...   of   Vimeo: vimeo.com/123456789" value={ytUrl} onChange={e=>setYtUrl(e.target.value)}/>
        {detected&&(<div className="yt-preview">
          <div className="yt-badge" style={{background:detected.platform==="Vimeo"?"rgba(26,183,234,.15)":"rgba(255,80,80,.15)",borderColor:detected.platform==="Vimeo"?"rgba(26,183,234,.35)":"rgba(255,80,80,.35)",color:detected.color}}>{detected.platform}</div>
          <span>Video ID: <strong style={{color:"#e8e4dc"}}>{detected.id}</strong></span>
          <span style={{marginLeft:"auto",fontSize:".68rem",color:detected.color}}>✓ herkend</span>
        </div>)}
        {ytUrl&&!detected&&<div style={{fontSize:".72rem",color:"#ffb347",marginTop:8}}>⚠ Geen geldige YouTube- of Vimeo-URL herkend</div>}
        <div style={{fontSize:".7rem",color:"#3e3c4a",marginTop:10,lineHeight:1.7}}>
          Ondersteund: <span style={{color:"#ff6b6b"}}>YouTube</span> (youtube.com, youtu.be, shorts) en{" "}
          <span style={{color:"#1ab7ea"}}>Vimeo</span> (vimeo.com). Claude zoekt de video-inhoud op via web search.
        </div>
      </>)}
    </>
  );
}

  const callClaude=async({system,userMsg,maxTokens=2000,pdf=null,useWebSearch=false})=>{
    const headers={"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    if(useWebSearch)headers["anthropic-beta"]="web-search-2025-03-05";
    let userContent=userMsg;
    if(pdf){const docs=Array.isArray(pdf)?pdf.map((p,i)=>({type:"document",title:p.name||`Document ${i+1}`,source:{type:"base64",media_type:"application/pdf",data:p.data}})):[{type:"document",source:{type:"base64",media_type:"application/pdf",data:pdf}}];userContent=[...docs,{type:"text",text:userMsg}];}
    const body={model:"claude-haiku-4-5",max_tokens:maxTokens,system,messages:[{role:"user",content:userContent}]};
    if(useWebSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,body:JSON.stringify(body)});
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.error?.message||"API fout");
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    return text.replace(/```json|```/g,"").trim();
  };
  const makeMapPrompt=(topic,contextHint)=>`${topic?`Mind map over: "${topic}"`:contextHint}\nDiepte: ${depthInstr}\nJSON: {"title":"...","branches":[{"text":"...","children":[{"text":"...","children":[]}]}]}`;
  const makeAnalyzePrompt=(contextHint)=>`Analyseer de volgende inhoud en stel 4-7 zinvolle mind map-onderwerpen voor:\n\n${contextHint}\n\nJSON: {"suggestions":[{"title":"...","description":"...","focus":"...3-5 woorden..."}]}`;
  const getSourceArgs=(srcType,text,pdfFiles,ytUrl)=>{
    if(srcType==="pdf"){const hint=pdfFiles.length===1?`de geüploade PDF "${pdfFiles[0].name}"`:(`de ${pdfFiles.length} geüploade PDF-bestanden (${pdfFiles.map(p=>p.name).join(", ")})`);return{pdf:pdfFiles,contextHint:hint};}
    if(srcType==="youtube")return{ytUrl,contextHint:`de video: ${ytUrl}`};

    if(sSrcType==="text"&&!sText.trim()&&!sTopic.trim())return;

    if(sSrcType==="youtube"&&!detectVideoUrl(ytUrl||"")){setError("Voer een geldige YouTube- of Vimeo-URL in.");return;}
    setLoading(true);setError("");setSingleResult(null);setProgress(15);
    const isYt=sSrcType==="youtube",isPdf=sSrcType==="pdf";
    try{
      setStatusMsg(isYt?`${detectVideoUrl(ytUrl||"")?.platform||"Video"} ophalen via web search...`:isPdf?"PDF analyseren...":"Genereren...");
      setProgress(35);
      const userMsg=isYt?`Zoek en analyseer deze YouTube video: ${ytUrl}\n\nBekijk de video-inhoud en maak er een gedetailleerde mind map van.\n\n${makeMapPrompt("","de video-inhoud")}`:makeMapPrompt(sTopic,contextHint);
      const raw=await callClaude({system:`Expert mind map structurer. Respond ONLY with valid JSON, no markdown. ${langNote}`,userMsg,pdf:isPdf?pdf:null,useWebSearch:isYt,maxTokens:4000});

              <span className="lbl" style={{marginBottom:0,display:"flex",alignItems:"center",gap:8}}>
                <span style={{color:"#1ab7ea"}}>🎬</span> Vimeo Access Token
                {vimeoToken&&<span style={{background:"rgba(26,183,234,.15)",border:"1px solid rgba(26,183,234,.3)",borderRadius:4,color:"#1ab7ea",fontSize:".6rem",padding:"1px 7px"}}>opgeslagen</span>}
              </span>
              <span style={{fontSize:".7rem",color:"#6b6875"}}>{showVimeoKey?"▲":"▼"} voor privé-video's</span>
            </div>
            {showVimeoKey&&(<div style={{marginTop:10}}>
              <input type="text" placeholder="Vimeo personal access token (scope: private)" value={vimeoToken} onChange={e=>saveVimeoToken(e.target.value)} style={{marginBottom:6}}/>
              <div className="api-note">Aanmaken op <a href="https://developer.vimeo.com/apps" target="_blank" rel="noreferrer" style={{color:"#1ab7ea",textDecoration:"none"}}>developer.vimeo.com/apps</a> → jouw app → Authentication → Personal access token → scope: <strong>private</strong></div>
            </div>)}
          </div>
        </div>
        <div className="tabs">
          <button className={`tab ${tab==="single"?"active":""}`} onClick={()=>{setTab("single");setError("");}}>📍 Enkelvoudig</button>
          <button className={`tab ${tab==="batch"?"active":""}`} onClick={()=>{setTab("batch");setError("");}}>📚 Batch / NotebookLM</button>
        </div>
        <div className="card" style={{paddingTop:18,paddingBottom:18}}>
          <div className="row" style={{marginTop:0}}>
            <div><span className="lbl" style={{marginBottom:5}}>Taal</span><div className="ltog"><button className={`lbtn ${lang==="nl"?"active":""}`} onClick={()=>setLang("nl")}>NL</button><button className={`lbtn ${lang==="en"?"active":""}`} onClick={()=>setLang("en")}>EN</button></div></div>
            <div><span className="lbl" style={{marginBottom:5}}>Diepte</span><select value={depth} onChange={e=>setDepth(e.target.value)}><option value="1">1 niveau</option><option value="2">2 niveaus</option><option value="3">3 niveaus</option></select></div>
            <div><span className="lbl" style={{marginBottom:5}}>Kleurenthema</span><select value={palName} onChange={e=>setPalName(e.target.value)}>{Object.keys(PALETTES).map(n=><option key={n}>{n}</option>)}</select></div>
          </div>
        </div>
        {tab==="single"&&(<div className="card">
          {sSrcType==="text"&&<><span className="lbl">💡 Onderwerp</span><input type="text" placeholder="bv. BPPV · Vestibulaire revalidatie · ICF-model" value={sTopic} onChange={e=>setSTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&generateSingle()} style={{marginBottom:14}}/><span className="lbl">📝 Context (optioneel)</span></>}
          {sSrcType!=="text"&&<span className="lbl">📥 Bron</span>}
          <SourceInput srcType={sSrcType} setSrcType={v=>{setSSrcType(v);setSingleResult(null);}} text={sText} setText={setSText} pdfFiles={sPdfFiles} setPdfFiles={setSPdfFiles} ytUrl={sYtUrl} setYtUrl={setSYtUrl} placeholder="Plak tekst of context..."/>
          <div className="row"><button className="btn-pri" style={{marginLeft:"auto"}} onClick={generateSingle} disabled={loading||!canGenSingle}>{loading?"Verwerken...":"⚡ Genereer"}</button></div>
        </div>)}
        {tab==="batch"&&(<div className="card">
          <span className="lbl">📥 Bron</span>
          <SourceInput srcType={bSrcType} setSrcType={v=>{setBSrcType(v);setSuggestions([]);setSelected(new Set());setMaps([]);mapsRef.current=[];}} text={bText} setText={setBText} pdfFiles={bPdfFiles} setPdfFiles={setBPdfFiles} ytUrl={bYtUrl} setYtUrl={setBYtUrl} placeholder={"Plak tekst uit NotebookLM, artikelen of samenvattingen...\n\nClaude analyseert de inhoud en stelt meerdere mind map-onderwerpen voor."}/>
          <div className="row">
            {bSrcType==="text"&&<span style={{fontSize:".7rem",color:"#6b6875"}}>{bText.length} tekens</span>}
            <button className="btn-pri" style={{marginLeft:"auto"}} onClick={analyzeSource} disabled={loading||!canAnalyze}>{loading&&!suggestions.length?"Analyseren...":"🔍 Analyseer & stel voor"}</button>
          </div>
        </div>)}
        {(progress>0||statusMsg)&&<><div className="pbar"><div className="pfill" style={{width:progress+"%"}}/></div><div className="pmsg">{statusMsg}</div></>}
        {error&&<div className="errmsg">⚠️ {error}</div>}
        {tab==="batch"&&suggestions.length>0&&!maps.length&&(<div className="sug-card">
          <span className="lbl">📌 Voorgestelde mind maps</span>
          <div className="sug-grid">
            {suggestions.map((s,i)=>{const sel=selected.has(i);return(<div key={i} className={`sug-item ${sel?"sel":""}`} onClick={()=>setSelected(prev=>{const n=new Set(prev);n.has(i)?n.delete(i):n.add(i);return n;})}>
              <div className="sug-check">{sel?"✓":""}</div>
              <div><div className="sug-title">{s.title}</div><div className="sug-desc">{s.description}</div></div>
            </div>);})}
          </div>
          <div className="sel-row">
            <span className="sel-note">{selected.size} van {suggestions.length} geselecteerd</span>
            <div style={{display:"flex",gap:8}}>
              <button className="btn-sec" onClick={()=>setSelected(new Set(suggestions.map((_,i)=>i)))}>Alles</button>
              <button className="btn-sec" onClick={()=>setSelected(new Set())}>Geen</button>
              <button className="btn-pri" onClick={generateMaps} disabled={!selected.size||loading}>⚡ Genereer {selected.size} map{selected.size!==1?"s":""}</button>
            </div>
          </div>
        </div>)}
        {maps.length>0&&<>
          {doneMaps.length>1&&<div className="zip-bar"><button className="btn-pri" onClick={downloadZip}>⬇ Download alle {doneMaps.length} als ZIP</button></div>}
          <div className="maps-grid">{maps.map(m=><MapCard key={m.id} item={m} palName={palName} onPreview={setPreview} apiKey={apiKey} lang={lang} contextHint={batchContext.hint} pdf={batchContext.pdf} onUpdate={updated=>{mapsRef.current=mapsRef.current.map(x=>x.id===m.id?{...x,data:updated}:x);setMaps([...mapsRef.current]);if(preview&&preview.title===m.data?.title)setPreview(updated);}}/>)}</div>
        </>}
        {tab==="single"&&singleResult&&(<div className="map-card" style={{width:"100%",maxWidth:720,marginBottom:18}}>
          <div className="map-card-hdr"><div><div className="map-card-title">{singleResult.title}</div><div className="map-card-meta">{singleResult.branches?.length} takken · {countNodes(singleResult.branches)} nodes</div></div></div>
          <div className="tree">{singleResult.branches.map((b,i)=><TreeNode key={i} node={b} depth={0} color={pal[i%pal.length]}/>)}</div>
          <BranchDepthEditor mindmap={singleResult} palName={palName} lang={lang} apiKey={apiKey} contextHint={sSrcType==="text"?(sText||sTopic):sSrcType==="youtube"?sYtUrl:""} pdf={sSrcType==="pdf"?sPdfFiles:null} onUpdate={updated=>{setSingleResult(updated);if(preview)setPreview(updated);}}/>
          <div className="map-actions">
            <button className="prev-btn" onClick={()=>setPreview(singleResult)}>👁 Preview</button>
            <ExportMenu mindmap={singleResult} palName={palName} safeName={singleResult.title.replace(/[^\w\s_-]/g,"").replace(/\s+/g,"_")}/>
          </div>
        </div>)}
        <div className="tip">
          <span style={{fontSize:"1rem",flexShrink:0}}>💡</span>
          <div><strong style={{color:"#7ab3c8"}}>Bronnen:</strong> Tekst · PDF · YouTube · Vimeo (publiek via web search, privé via access token + transcript API). Exporteer als OPML of .mm → SimpleMind Pro via <em>File → Import</em>.</div>
        </div>
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    const hideLoader = () => {
      const l = document.getElementById('loader');
      if(l){ l.classList.add('hidden'); setTimeout(()=>{if(l.parentNode)l.remove();}, 600); }
    };
    setTimeout(hideLoader, 200);
  </script>

  <!-- Run JSX via Sucrase -->
  <script>
    try {
      var src = document.getElementById('app-source').textContent;
      var compiled = sucrase.transform(src, {transforms: ['jsx', 'imports']}).code;
      var script = document.createElement('script');
      script.textContent = compiled;
      document.body.appendChild(script);
    } catch(e) {
      var l = document.getElementById('loader');
      if(l) l.innerHTML = '<div style="text-align:center;padding:40px;color:#ff7070;font-family:monospace"><div style="font-size:2rem;margin-bottom:16px">⚠️</div><div>' + e.message + '</div><button onclick="location.reload()" style="margin-top:16px;background:#9c5dff;border:none;border-radius:8px;color:white;padding:10px 20px;font-family:monospace;cursor:pointer">↻ Herladen</button></div>';
    }
  </script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
